server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:xiaoke_daily}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: false
    open-in-view: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB

app:
  upload-dir: ${APP_UPLOAD_DIR:../uploads}
  public-upload-base-url: ${APP_PUBLIC_UPLOAD_BASE_URL:/uploads}
  admin-username: ${ADMIN_INITIAL_USERNAME:admin}
  admin-password: ${ADMIN_INITIAL_PASSWORD}
