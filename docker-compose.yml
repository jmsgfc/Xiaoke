services:
  mysql:
    image: mysql:8.4
    container_name: xiaoke-daily-mysql
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/sql/docker-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 12

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: xiaoke-daily-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USERNAME: ${MYSQL_USERNAME}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      ADMIN_INITIAL_USERNAME: ${ADMIN_INITIAL_USERNAME}
      ADMIN_INITIAL_PASSWORD: ${ADMIN_INITIAL_PASSWORD}
      APP_UPLOAD_DIR: /data/uploads
      APP_PUBLIC_UPLOAD_BASE_URL: /uploads
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./uploads:/data/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: xiaoke-daily-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "127.0.0.1:8081:80"

volumes:
  mysql_data:
